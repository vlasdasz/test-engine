[package]
authors = ["Vladas Zakrevskis <146100@gmail.com>"]
edition.workspace = true
name = "level"
version.workspace = true

[lib]
crate-type = ["rlib", "staticlib"]
name = "level"

[dependencies]
educe = { workspace = true }

gm = { workspace = true }
level-proc = { workspace = true }
plat = { workspace = true }
refs = { workspace = true }
utils = { workspace = true }
vents = { workspace = true }
window = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
rapier2d = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rapier2d = { workspace = true, features = ["parallel"] } # simd can crash if there are too many active objects
